# fly.toml app configuration file for summit-consultancy.
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'summit-consultancy'
primary_region = 'fra' # Frankfurt — closest Fly region to a UK consultancy
console_command = '/code/manage.py shell'

[build]
  dockerfile = 'Dockerfile'

# Runs in a temporary, secret-and-env-aware Machine before the new version's
# Machines start (Fly's equivalent of Render's preDeployCommand, but not
# plan-gated). Its filesystem does NOT persist, so this is only safe for
# things whose effect lives in the database, not on disk — migrate qualifies,
# collectstatic does not (that runs in bin/start.sh on every Machine boot).
[deploy]
  release_command = 'uv run --no-sync python manage.py migrate'

[env]
  DJANGO_SETTINGS_MODULE = 'config.settings.production'
  ALLOWED_HOSTS = 'summit-consultancy.fly.dev'
  SITE_DOMAIN = 'summit-consultancy.fly.dev' # sitemap.xml host + allauth emails — update if a custom domain is added later
  # Local DeepSeek AI is an on-prem endpoint (Ollama etc.), not reachable from
  # Fly. Explicitly blank so is_enabled() is False in production instead of
  # inheriting the local-dev default (http://localhost:11434/v1), which would
  # just fail every AI call.
  DEEPSEEK_BASE_URL = ''
  # Microsoft 365 SMTP AUTH (OAuth2/XOAUTH2 — see apps/core/ms365_smtp.py).
  # smtp.office365.com is the organizational-mailbox endpoint, not
  # smtp-mail.outlook.com (that host is for personal @outlook.com/@hotmail.com
  # accounts). No IMAP/POP settings here — this app only sends mail, nothing
  # reads it back. MS365_TENANT_ID / MS365_CLIENT_ID / MS365_CLIENT_SECRET /
  # MS365_SMTP_USER are secrets, set via `fly secrets set`, not here.
  EMAIL_HOST = 'smtp.office365.com'
  EMAIL_PORT = '587'
  EMAIL_USE_TLS = 'true'

# ONE process group only. gunicorn and the Celery worker run together inside
# it (via Procfile + honcho — see bin/start.sh), because the tender document
# upload flow stages files on local disk (TENDER_UPLOAD_STAGING_DIR) and the
# Celery task reads that same path — see apps/tenders/views.py/tasks.py. Fly
# process groups run as SEPARATE Machines with separate filesystems, so
# splitting this into "app"/"worker" groups would break uploads exactly like
# splitting web/worker into separate Render services would have. Don't split
# this without first refactoring the upload flow to write directly to R2.
[processes]
  app = './bin/start.sh'

[http_service]
  internal_port = 8443 # must match the port gunicorn binds to in Procfile/bin/start.sh
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one Machine warm. At 0, the proxy autostops the only Machine whenever it
  # sees no traffic — including part-way through a boot, before it can pass a
  # health check and become eligible for traffic. That deadlocks: boot, get
  # stopped, restart on the next request, repeat, serving 503 throughout. Scaling
  # this single Machine to zero also made every cold visitor wait out a full
  # Django boot, so there was little to win here anyway.
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/'
    protocol = 'http'

    # Both headers are load-bearing — without them this check can never return
    # the 200 Fly requires (it does not follow redirects, so anything but 200
    # fails the deploy):
    #
    # Host — the check connects straight to the Machine, not through the edge,
    #   so it does not send the public hostname. Django validates Host against
    #   ALLOWED_HOSTS before any view runs and answers 400 DisallowedHost.
    # X-Forwarded-Proto — this probe is plain HTTP (TLS terminates at Fly's
    #   edge, which is why protocol is 'http'). SECURE_SSL_REDIRECT in
    #   config/settings/production.py 301-redirects anything Django does not
    #   consider secure, and SECURE_PROXY_SSL_HEADER only trusts this header.
    #   Faking it here is safe: nothing off-Machine can reach this port.
    [http_service.checks.headers]
      Host = 'summit-consultancy.fly.dev'
      X-Forwarded-Proto = 'https'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'

# No [[statics]] block: static files are served by WhiteNoise (see
# config/settings/production.py STORAGES["staticfiles"]), which renames files
# with content hashes for cache-busting. Fly's native static serving would
# need to point at the *collected* output (STATIC_ROOT), not the raw source
# directory, and would bypass WhiteNoise's manifest entirely — simpler to
# just let WhiteNoise handle it, matching how the app already works elsewhere.
